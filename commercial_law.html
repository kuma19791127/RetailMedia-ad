<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特定商取引法に基づく表記 - RetailMedia Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
            color: #333;
            line-height: 1.8;
            margin: 0;
            padding: 0;
        }
        header {
            background: #fff;
            padding: 20px 40px;
            box-shadow: 0 1px 10px rgba(0,0,0,0.05);
            text-align: center;
        }
        header a {
            font-size: 24px;
            font-weight: 900;
            color: #2563eb;
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 2rem;
            color: #0f172a;
            margin-bottom: 40px;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            text-align: left;
        }
        th {
            width: 30%;
            color: #2563eb;
            font-weight: bold;
            background: #f8fafc;
        }
        .back-btn {
            display: inline-block;
            margin-top: 40px;
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
        }
        @media (max-width: 768px) {
            .container { margin: 20px; padding: 20px; }
            th, td { display: block; width: 100%; }
            th { border-bottom: none; padding-bottom: 5px; }
            td { padding-top: 5px; }
        }
    </style>

    <!-- ULTIMATE JAPANESE TYPOGRAPHY FIX -->
    <script src="https://unpkg.com/budoux/bundle/budoux-ja.min.js"></script>
    <style>
        h1, h2, h3, h4, h5 {
            text-wrap: balance !important;
            word-break: keep-all !important;
            overflow-wrap: break-word !important;
        }
        p, .subtitle, li, .card p, .card h3 {
            word-break: keep-all !important;
            overflow-wrap: break-word !important;
        }
        @media (max-width: 768px) {
            .desktop-br { display: none !important; }
            h1 { font-size: clamp(1.8rem, 6vw, 2.5rem) !important; line-height: 1.3 !important; }
            h2 { font-size: clamp(1.4rem, 5vw, 2rem) !important; line-height: 1.4 !important; }
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof budoux !== 'undefined') {
                const parser = budoux.loadDefaultJapaneseParser();
                document.querySelectorAll('h1, h2, h3, p, .subtitle, li').forEach(el => {
                    parser.applyToElement(el);
                });
            }
        });
    </script>
    <!-- END TYPOGRAPHY FIX -->


    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9174386245513478" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <a href="index.html">retail-ad</a>
    </header>
    <div class="container">
        <h1>特定商取引法に基づく表記</h1>
        
        <table>
            <tbody>
                <tr>
                    <th>事業者名</th>
                    <td>non-logi株式会社</td>
                </tr>
                <tr>
                    <th>代表者</th>
                    <td>熊澤 一</td>
                </tr>
                <tr>
                    <th>所在地</th>
                    <td>横浜市</td>
                </tr>
                <tr>
                    <th>連絡先</th>
                    <td>メール: info@retail-ad.awsapps.com</td>
                </tr>
                <tr>
                    <th>販売価格</th>
                    <td>各プラン・サービスごとに表示された金額とします。</td>
                </tr>
                <tr>
                    <th>支払方法</th>
                    <td>クレジットカード決済をご利用いただけます。</td>
                </tr>
                <tr>
                    <th>支払時期</th>
                    <td>ご利用のカード会社の引き落とし日となります。</td>
                </tr>
                <tr>
                    <th>サービスの提供時期</th>
                    <td>代金決済手続きの完了確認後、直ちにご利用いただけます。</td>
                </tr>
                <tr>
                    <th>返品・キャンセル</th>
                    <td>サービスの性質上、原則として返品・キャンセルはお受けできません。</td>
                </tr>
            </tbody>
        </table>

        <a href="javascript:history.back()" class="back-btn">← 戻る</a>
    </div>
</body>
</html>
