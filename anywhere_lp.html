    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #10b981;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--light);
            color: #333;
            line-height: 1.6;
            overflow-x: hidden;
            word-wrap: break-word; /* Safe fallback */
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 15px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 700;
            font-size: 14px;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .hero {
            padding: 140px 20px 80px;
            background: linear-gradient(135deg, #1e293b, var(--dark));
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.2rem;
            color: #cbd5e1;
            max-width: 800px;
            margin: 0 auto 40px;
        }

        .hero .btn {
            background: var(--primary);
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s;
            display: inline-block;
        }

        .hero .btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .section {
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 50px;
            color: var(--dark);
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .card-danger {
            border-left: 5px solid var(--danger);
        }

        .card-success {
            border-left: 5px solid var(--secondary);
        }

        .card-primary {
            border-left: 5px solid var(--primary);
        }

        h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .danger-text {
            color: var(--danger);
        }

        .success-text {
            color: var(--secondary);
        }

        .primary-text {
            color: var(--primary);
        }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; } .table-responsive table { min-width: 600px; font-size: 0.9rem; margin-bottom:0; } table { word-break: keep-all; }

            .card { padding: 20px !important; }
            .hero { padding: 180px 10px 40px !important; }
        }
    </style>
    <!-- BudouX for Japanese Typography -->
    <script src="https://unpkg.com/budoux/bundle/budoux-ja.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof budoux !== 'undefined') {
                const parser = budoux.loadDefaultJapaneseParser();
                document.querySelectorAll('h1, h2, h3, p, .subtitle, li').forEach(el => {
                    parser.applyToElement(el);
                });
            }
        });
    </script>
    <!-- END TYPOGRAPHY FIX -->


    <!-- ULTIMATE JAPANESE TYPOGRAPHY FIX -->

        p, .subtitle, li, .card p, .card h3 {
            word-break: keep-all !important;
            overflow-wrap: break-word !important;
        }
        @media (max-width: 768px) {
            .desktop-br { display: none !important; }
            h1 { font-size: clamp(1.8rem, 6vw, 2.5rem) !important; line-height: 1.3 !important; }
            h2 { font-size: clamp(1.4rem, 5vw, 2rem) !important; line-height: 1.4 !important; }
        }
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
