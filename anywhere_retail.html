<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小売り向け設定パネル</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+JP:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #F8FAFC;
            color: #1E293B;
            margin: 0; padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        h2 { text-align: center; color: #2563EB; }
        
        /* 16文字程度での改行を促すための幅制限と文字組み */
        .desc-text {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
            color: #64748B;
            word-break: keep-all;
            overflow-wrap: break-word;
            padding: 10px;
            background: #F1F5F9;
            border-radius: 8px;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📱 どこでもレジ <br><span style="font-size:14px; color:#64748B;">store@demo.com</span></h2>
        
        <p class="desc-text">
            こちらのページは<br>
            小売り店舗様の<br>
            設定専用ページです。<br>
            各種データ取込や<br>
            売上確認が可能です。
        </p>

        <a href="anywhere_lp.html" class="menu-btn" style="background:#3b82f6;">📖 LPを見る</a>
        <button onclick="alert('会社別売上データ取得機能')" class="menu-btn" style="background:#0ea5e9;">📊 会社別売上</button>
        <button onclick="document.getElementById('excel-master-upload').click()" class="menu-btn" style="background:#10B981;">📥 商品データ取込</button>
        <input type="file" id="excel-master-upload" accept=".xlsx, .csv, .js" style="display:none;" onchange="alert('商品データファイルを選択しました')">
        <button onclick="alert('POS・システム連携設定機能')" class="menu-btn" style="background:#8e44ad;">⚙️ 連携設定</button>
        <button onclick="alert('スキャン履歴一覧機能')" class="menu-btn" style="background:#f59e0b;">🛠 スキャン履歴</button>
        
        <a href="anywhere_regi.html" style="display:block; text-align:center; margin-top:20px; color:#2563EB; font-weight:bold; text-decoration:underline;">← ログイン画面へ戻る</a>
    </div>
</body>
</html>
