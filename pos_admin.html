<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>小売りモバイルPOS レジ管理画面</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background: #f8fafc; margin: 0; padding: 20px; color: #1e293b; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; }
        .header h1 { margin: 0; font-size: 24px; color: #0f172a; }
        .btn-logout { padding: 8px 16px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .revenue-big { font-size: 36px; font-weight: bold; color: #27ae60; }
        .card-label { font-size: 12px; color: #95a5a6; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏪 モバイルPOS 店舗管理画面</h1>
        <div>
            <button onclick="window.location.href='index.html'" style="padding: 8px 16px; background: #cbd5e1; border: none; border-radius: 6px; cursor: pointer; margin-right: 10px; font-weight:bold;">総合トップへ戻る</button>
            <button class="btn-logout" onclick="logout()">ログアウト</button>
        </div>
    </div>
    
    <div style="max-width: 1000px; margin: 0 auto;">
        <div class="card" style="margin-bottom:20px; border-left: 5px solid #3b82f6;" id="pos-sales-container">
                <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; padding-bottom:10px; margin-bottom:15px;">
                    <h3 style="margin:0; color:#2c3e50;"><span style="white-space:pre;">🛒 </span>モバイルPOS売上状況</h3>
                    <div style="display:flex; gap:10px;">
                        <button onclick="document.getElementById('pos-master-upload').click()" class="btn-sm" style="background:#10B981; color:white; border:none; padding:8px 12px; font-weight:bold; border-radius:6px; cursor:pointer;">📥 商品データ取込</button>
                        <input type="file" id="pos-master-upload" accept=".xlsx, .xls" style="display:none;" onchange="handleExcelUpload(event)">
                        <button onclick="showIntegrationSettings()" class="btn-sm" style="background:#8e44ad; color:white; border:none; padding:8px 12px; font-weight:bold; border-radius:6px; cursor:pointer;">⚙️ POS連携設定</button>
                    </div>
                </div>
                
                <div class="metric-grid">
                    <div style="background:#f8fafc; padding:15px; border-radius:8px;">
                        <div class="card-label">総売り上げ (Total Sales)</div>
                        <div class="revenue-big" id="pos-total-sales">¥0</div>
                    </div>
                    <div style="background:#f8fafc; padding:15px; border-radius:8px;">
                        <div class="card-label">本日の客数 (Customers)</div>
                        <div class="revenue-big" id="pos-total-customers" style="color:#0ea5e9;">0人</div>
                    </div>
                </div>

                <h4 style="color:#2c3e50; margin-top:20px;">🏢 顧客(企業)別売上</h4>
                <div id="company-sales-list" style="background:#f1f5f9; padding:15px; border-radius:8px; max-height:200px; overflow-y:auto; font-size:14px;">
                    読み込み中...
                </div>

                <h4 style="color:#2c3e50; margin-top:20px;">📋 決済＆スキャン履歴</h4>
                <div id="tx-history-list" style="background:#1e293b; color:#a5b4fc; padding:15px; border-radius:8px; max-height:250px; overflow-y:auto; font-size:13px; font-family:monospace;">
                    読み込み中...
                </div>
            </div>

            <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    </div>

    <script>
        function logout() {
            sessionStorage.removeItem('retailMediaAuth');
            window.location.replace('index.html');
        }
    </script>
</body>
</html>
