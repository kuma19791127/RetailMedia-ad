<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Movie - YouTube Style CMS</title>
    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            height: 600px;
        }

        /* Admin Panel (Left) */
        .admin-panel {
            flex: 1;
            background: #222;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #444;
            padding-bottom: 15px;
        }

        .header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: #ccc;
        }

        .btn-upload {
            background: #e74c3c;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .playlist {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
        }

        .playlist-item {
            background: #333;
            padding: 15px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            border: 1px solid #444;
            transition: 0.2s;
        }

        .playlist-item.active {
            border-color: #2ecc71;
            background: #2a2a2a;
        }

        .thumbnail {
            width: 60px;
            height: 34px;
            background: #555;
            border-radius: 4px;
            background-size: cover;
            background-position: center;
        }

        .info {
            flex: 1;
        }

        .title {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .details {
            font-size: 0.75rem;
            color: #888;
        }

        /* Draggable Item Animation */
        .playlist-item:nth-child(3) {
            position: relative;
            animation: dragDrop 8s infinite ease-in-out;
            z-index: 10;
        }

        @keyframes dragDrop {

            0%,
            20% {
                transform: translateY(0);
                box-shadow: none;
            }

            25% {
                transform: scale(1.02);
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
                border-color: #3498db;
            }

            45% {
                transform: translateY(-160px) scale(1.02);
            }

            /* Move up 2 slots */
            50%,
            100% {
                transform: translateY(-160px);
                border-color: #e74c3c;
                box-shadow: none;
            }
        }

        /* Signage Screen (Right) */
        .signage-preview {
            flex: 1.2;
            background: black;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            border: 5px solid #444;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        .screen-content {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.5s;
            opacity: 0;
        }

        /* Screen Animations synced with Playlist */
        /* Normal Ad */
        #screen1 {
            background-image: url('download111.png');
            /* Store Image */
            opacity: 1;
            animation: fade1 8s infinite;
        }

        /* Time Sale Ad */
        #screen2 {
            background-color: #e74c3c;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fade2 8s infinite;
        }

        @keyframes fade1 {

            0%,
            48% {
                opacity: 1;
            }

            50%,
            100% {
                opacity: 0;
            }
        }

        @keyframes fade2 {

            0%,
            48% {
                opacity: 0;
            }

            50%,
            100% {
                opacity: 1;
            }
        }

        /* Mouse Cursor Animation */
        .cursor {
            width: 20px;
            height: 20px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="white" stroke="black" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>') no-repeat;
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 100;
            animation: cursorMove 8s infinite ease-in-out;
        }

        /* Cursor Movement within Playlist */
        @keyframes cursorMove {

            0%,
            20% {
                transform: translate(300px, 400px);
            }

            /* Start at Item 3 */
            25% {
                transform: translate(300px, 400px) scale(0.9);
            }

            /* Click */
            45% {
                transform: translate(300px, 240px);
            }

            /* Drag up */
            50% {
                transform: translate(300px, 240px) scale(1);
            }

            /* Release */
            55% {
                transform: translate(400px, 500px);
            }

            /* Move away */
            100% {
                transform: translate(400px, 500px);
            }
        }

        /* Text Overlay on Screen 2 */
        .big-text {
            font-size: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .badge {
            background: white;
            color: #e74c3c;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9174386245513478" crossorigin="anonymous"></script>

    <!-- PWA Setup -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/app-icon.jpg">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js');
        });
      }
    </script>
</head>

<body>

    <div class="container">
        <!-- Left: Manager -->
        <div class="admin-panel">
            <div class="header">
                <h2>📢 配信管理 (Playlist)</h2>
                <div class="btn-upload">＋ 新規作成</div>
            </div>

            <div class="playlist">
                <!-- Cursor Element -->
                <div class="cursor"></div>

                <!-- Items -->
                <div class="playlist-item">
                    <div class="thumbnail" style="background-color:#555;"></div>
                    <div class="info">
                        <div class="title">通常広告 A</div>
                        <div class="details">お惣菜コーナー • 15秒</div>
                    </div>
                    <div>≡</div>
                </div>

                <div class="playlist-item">
                    <div class="thumbnail" style="background-color:#777;"></div>
                    <div class="info">
                        <div class="title">通常広告 B</div>
                        <div class="details">ドリンク • 15秒</div>
                    </div>
                    <div>≡</div>
                </div>

                <!-- Draggable Item (Time Sale) -->
                <div class="playlist-item" style="border-left: 5px solid #e74c3c;">
                    <div class="thumbnail" style="background-color:#e74c3c;"></div>
                    <div class="info">
                        <div class="title" style="color:#e74c3c;">🔥 タイムセール (急上昇)</div>
                        <div class="details">全フロア一斉配信 • 優先度高</div>
                    </div>
                    <div>≡</div>
                </div>

                <div style="margin-top:auto; font-size:0.8rem; color:#666; text-align:center;">
                    配信順を変更可能。<br>変更はリアルタイムで反映されます。
                </div>
            </div>
        </div>

        <!-- Right: Player -->
        <div class="signage-preview">
            <div class="screen-content" id="screen1">
                <!-- BG Image set in CSS -->
            </div>
            <div class="screen-content" id="screen2">
                <div class="badge">LIVE UPDATE</div>
                <div class="big-text">TIME SALE</div>
                <div style="font-size:1.5rem;">全品 20% OFF</div>
                <div style="font-size:5rem;">⚡</div>
            </div>

            <!-- YouTube-like Bar -->
            <div style="position:absolute; bottom:0; left:0; width:100%; height:5px; background:rgba(255,255,255,0.3);">
                <div style="width:0%; height:100%; background:red; animation: progress 8s infinite linear;"></div>
            </div>
        </div>
    </div>

    <style>
        @keyframes progress {
            0% {
                width: 0%
            }

            100% {
                width: 100%
            }
        }
    </style>
</body>

</html>
