<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anywhere Ads | AI Video Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #e67e22, #f1c40f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .studio-panel {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 30px;
        }

        .controls {
            flex: 1;
        }

        .preview {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 8px;
            height: 400px;
            position: relative;
            overflow: hidden;
            border: 2px solid #34495e;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #bdc3c7;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #3498db, #8e44ad);
            border: none;
            color: white;
            font-weight: bold;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .generate-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.5);
        }

        .distribute-btn {
            width: 100%;
            padding: 15px;
            background: #27ae60;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            display: none;
        }

        /* Video Simulation */
        .video-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }

        .text-layer {
            position: absolute;
            z-index: 10;
            color: white;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            width: 90%;
        }

        .video-placeholder {
            color: #7f8c8d;
            font-size: 14px;
        }

        /* Animations */
        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            80% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .anim-pop {
            animation: popIn 0.8s ease-out forwards;
        }

        .anim-slide {
            animation: slideUp 1s ease-out forwards;
        }
    </style>

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9174386245513478" crossorigin="anonymous"></script>

    <!-- PWA Setup -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="/app-icon.png">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js');
        });
      }
    </script>

    <!-- Global Mobile Typography Fix -->
    <style>
        body, h1, h2, h3, h4, h5, p, span, div {
            word-break: auto-phrase !important; /* Forces modern browser Japanese phrase break */
            word-break: keep-all; /* Fallback */
            overflow-wrap: break-word;
        }
        .mobile-br { display: none; }
        .desktop-br { display: block; }
        @media (max-width: 768px) {
            .mobile-br { display: block; }
            .desktop-br { display: none; }
            
            /* Auto-reduce huge headings on mobile globally to prevent overflow */
            h1 { font-size: clamp(1.8rem, 8vw, 2.8rem) !important; line-height: 1.3 !important; }
            h2 { font-size: clamp(1.5rem, 6vw, 2.2rem) !important; line-height: 1.4 !important; }
            h3 { font-size: clamp(1.2rem, 5vw, 1.8rem) !important; line-height: 1.4 !important; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">✨ AI Video Studio</div>
            <div style="font-size:12px; color:#bdc3c7;">Powered by Omni-Gen AI</div>
        </div>

        <div class="studio-panel">
            <div class="controls">
                <div class="input-group">
                    <label>Campaign Text</label>
                    <textarea id="ad-text" placeholder="e.g. Today's Special! Hokkaido Scallops 50% OFF!"></textarea>
                </div>
                <div class="input-group">
                    <label>Mood & Style</label>
                    <select id="ad-style">
                        <option value="energetic">🔥 High Energy (Sale)</option>
                        <option value="elegant">✨ Elegant (Premium)</option>
                        <option value="fresh">🌿 Fresh (Vegetables)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Voice Speed: <span id="speed-val">0.8</span>x</label>
                    <input type="range" id="voice-speed" min="0.5" max="1.5" step="0.1" value="0.8"
                        oninput="document.getElementById('speed-val').innerText = this.value" style="width:100%;">
                </div>
                <button class="generate-btn" onclick="generateVideo()">✨ Generate AI Video</button>
                <button class="distribute-btn" id="dist-btn" onclick="distributeVideo()">📡 Broadcast to Store</button>
            </div>

            <div class="preview" id="video-preview">
                <div class="video-placeholder">AI Video Preview Area</div>
            </div>
        </div>
    </div>

    <script>
        function generateVideo() {
            const text = document.getElementById('ad-text').value;
            if (!text) return Swal.fire('Error', 'Please enter some text!', 'warning');

            const style = document.getElementById('ad-style').value;
            const preview = document.getElementById('video-preview');

            // 1. Simulate Processing
            preview.innerHTML = '<div style="color:#f39c12">⚡ Generating Scenes...<br>🎨 Rendering Textures...<br>🎵 Composing Audio...</div>';

            setTimeout(() => {
                // 2. Render Result via CSS "Fake Video"
                let bgGradient = '';
                let animClass = '';

                if (style === 'energetic') {
                    bgGradient = 'linear-gradient(135deg, #e74c3c, #f1c40f)';
                    animClass = 'anim-pop';
                } else if (style === 'elegant') {
                    bgGradient = 'linear-gradient(135deg, #2c3e50, #bdc3c7)';
                    animClass = 'anim-slide';
                } else {
                    bgGradient = 'linear-gradient(135deg, #27ae60, #2ecc71)';
                    animClass = 'anim-slide';
                }

                preview.innerHTML = `
                    <div style="position:absolute; width:100%; height:100%; background:${bgGradient};"></div>
                    <div class="text-layer ${animClass}" style="font-size: 32px;">${text}</div>
                    <div style="position:absolute; bottom:20px; right:20px; font-size:12px; color:rgba(255,255,255,0.7);">AI Generated Content</div>
                `;

                document.getElementById('dist-btn').style.display = 'block';
                Swal.fire({
                    toast: true, position: 'top-end', icon: 'success',
                    title: 'Video Generated!', showConfirmButton: false, timer: 1500
                });

            }, 2000);
        }

        async function distributeVideo() {
            // Call API to register this "Fake Video" as the active campaign
            const text = document.getElementById('ad-text').value;
            const speed = document.getElementById('voice-speed').value;
            await fetch(`/api/ai/generate?text=${encodeURIComponent(text)}&speed=${speed}`);

            Swal.fire('Broadcasted!', 'Your AI Video is now live on store signage.', 'success');
        }
    </script>
</body>

</html>
