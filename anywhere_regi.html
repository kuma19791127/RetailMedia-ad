<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>どこでもレジ | Anywhere Register</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script type="text/javascript" src="https://web.squarecdn.com/v1/square.js"></script>
    <script src="square_integration.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563EB;
            --primary-dark: #1E40AF;
            --accent-color: #F59E0B;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1F2937;
            --text-sub: #6B7280;
            --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Poppins', 'Noto Sans JP', sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 共通ヘッダー */
        .app-header {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            z-index: 100;
        }

        .header-logo {
            font-size: 20px;
            font-weight: 700;
            color: #2563EB;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-logo::before { content: '⚡'; }
        .header-info { font-size: 11px; text-align: right; color: var(--text-sub); line-height: 1.3; }

        .page {
            display: none; flex: 1; padding: 20px; overflow-y: auto; animation: fadeIn 0.3s ease-out;
        }
        .page.active { display: flex; flex-direction: column; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login Screen */
        #page-login { justify-content: center; align-items: center; }
        .login-card { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: var(--shadow-lg); width: 100%; max-width: 320px; text-align: center; }
        .login-title { font-size: 24px; font-weight: 700; margin-bottom: 30px; color: var(--text-main); }
        .login-input { width: 100%; padding: 16px; font-size: 16px; border: 2px solid #E5E7EB; border-radius: 12px; box-sizing: border-box; text-align: left; margin-bottom: 15px; transition: border-color 0.2s; font-family: inherit; }
        .login-input:focus { border-color: #2563EB; outline: none; }
        .btn-primary { background: #2563EB; color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3); }
        .btn-primary:active { transform: scale(0.98); }

        /* Store Selector Bar */
        .store-selector-bar { background: white; padding: 10px 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; flex-shrink: 0; }
        select { flex: 1; padding: 8px 12px; font-size: 14px; border-radius: 8px; border: 1px solid #E5E7EB; background: #F9FAFB; font-family: inherit; color: var(--text-main); }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
        .btn-logout { background: #F3F4F6; color: var(--text-sub); }

        /* Scanner Area */
        #scanner-container { width: 100%; max-width: 400px; margin: 20px auto 0; border-radius: 16px; overflow: hidden; background: #000; aspect-ratio: 4/3; position: relative; box-shadow: var(--shadow-lg); flex-shrink: 0; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .scan-guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 40%; border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 8px; box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.4); z-index: 10; }
        .scan-guide::after { content: 'SCAN BARCODE'; position: absolute; bottom: -25px; width: 100%; text-align: center; color: white; font-size: 12px; font-weight: 600; letter-spacing: 1px; }

        /* Action Buttons */
        .action-area { max-width: 400px; margin: 20px auto 0; width: 100%; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        .btn-next { background: var(--bg-gradient); color: var(--text-main); border: 2px solid #2563EB; display: none; }
        .btn-pay { background: linear-gradient(135deg, #10B981 0%, #059669 100%); color: white; }

        /* Cart List */
        .cart-container { background: white; border-radius: 16px 16px 0 0; margin-top: 20px; flex: 1; min-height: 200px; padding: 20px; box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.05); display: flex; flex-direction: column; flex-shrink: 0; }
        .total-display { font-size: 32px; font-weight: 800; color: var(--text-main); text-align: right; border-bottom: 2px solid #F3F4F6; padding-bottom: 15px; margin-bottom: 15px; }
        .total-display span { font-size: 18px; color: var(--text-sub); margin-right: 5px; }
        #items { overflow-y: auto; flex: 1; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; animation: slideIn 0.2s ease-out; }
        
        @keyframes slideIn { from { transform: translateX(-10px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Payment SCreen */
        #page-payment { align-items: center; justify-content: center; text-align: center; }
        .payment-card { background: white; padding: 40px; border-radius: 24px; box-shadow: var(--shadow-lg); width: 100%; max-width: 340px; }
        
        #sq-payment-form { width: 100%; margin-top: 20px; }

        /* Overlay Mask */
        #mask { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); color: white; justify-content: center; align-items: center; flex-direction: column; z-index: 50; backdrop-filter: blur(5px); }
        .mask-icon { font-size: 40px; margin-bottom: 15px; }

        #modal-reset { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); align-items: center; justify-content: center; z-index: 200; }
    </style>

    <!-- Global Mobile Typography Fix -->
    <style>
        body, h1, h2, h3, h4, h5, p, span, div {
            word-break: auto-phrase !important; /* Forces modern browser Japanese phrase break */
            word-break: keep-all; /* Fallback */
            overflow-wrap: break-word;
        }
        .mobile-br { display: none; }
        .desktop-br { display: block; }
        @media (max-width: 768px) {
            .mobile-br { display: block; }
            .desktop-br { display: none; }
            
            /* Auto-reduce huge headings on mobile globally to prevent overflow */
            h1 { font-size: clamp(1.8rem, 8vw, 2.8rem) !important; line-height: 1.3 !important; }
            h2 { font-size: clamp(1.5rem, 6vw, 2.2rem) !important; line-height: 1.4 !important; }
            h3 { font-size: clamp(1.2rem, 5vw, 1.8rem) !important; line-height: 1.4 !important; }
        }
    </style>

    <!-- BudouX for Japanese Typography (Safari/iOS compatible) -->
    <script src="https://unpkg.com/budoux/bundle/budoux-ja.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof budoux !== 'undefined') {
                const parser = budoux.loadDefaultJapaneseParser();
                // Apply to standard text elements avoiding breaking components
                const elements = document.querySelectorAll('h1, h2, h3, p, .card p, .subtitle');
                elements.forEach(el => {
                    parser.applyToElement(el);
                });
            }
        });
    </script>

    <!-- Security Check: Redirect to login if cache/session is cleared or app restarted -->
    <script>
        // Check if the user has a valid session token (cleared on restart or cache clear)
        if (!sessionStorage.getItem('retailMediaAuth')) {
            window.location.replace('index.html');
        }
    </script>
</head>

    <!-- Debug Log Panel -->
    <div id="debug-log-panel" style="display:none; position:fixed; bottom:0; left:0; width:100%; height:35%; background:rgba(0,0,0,0.85); color:#0fa; font-family:monospace; font-size:12px; z-index:9999; padding:15px; overflow-y:auto; box-sizing:border-box; border-top:3px solid #2563EB;">

    <script src="products.js"></script>
    <script>
        // --- Debug Log System ---
        function toggleDebugLog() {
            const p = document.getElementById('debug-log-panel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        function logDebug(msg) {
            console.log(msg);
            const content = document.getElementById('debug-log-content');
            if(content) {
                const timeStr = new Date().toLocaleTimeString();
                content.innerHTML += `<div style="margin-bottom:4px; border-bottom:1px solid rgba(0,255,170,0.2);">[${timeStr}] ${msg}</div>`;
                content.scrollTop = content.scrollHeight;
            }
        }
        // --- Global State ---
        let currentSession = null;
        let currentStoreConfig = null;

        const API_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.protocol === 'file:') ? 'http://localhost:3000' : '';

        // --- IndexedDB Product Master DB (Dexie.js) ---
        var db = new Dexie("AnywhereRegiDB");
        db.version(1).stores({
            products: 'janCode, name, price, category'
        });

        // --- EXCEL BULK IMPORT (50,000+ items possible into IndexedDB) ---
        async function importProductMaster(event) {
            const file = event.target.files[0];
            if (!file) return;

            Swal.fire({
                title: '商品マスター読込中...',
                text: 'エクセルから数万点の商品データをブラウザ(IndexedDB)にキャッシュ中',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            const reader = new FileReader();
            reader.onload = async function (e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);
                    
                    if(json.length === 0) throw new Error("データが空です");

                    // Map columns dynamically
                    const productsToInsert = json.map(row => ({
                        janCode: String(row['JAN'] || row['janCode'] || row['JANコード'] || row['バーコード'] || Math.floor(Math.random()*1000000000000)),
                        name: row['商品名'] || row['name'] || "不明な商品",
                        price: parseInt(row['価格'] || row['price'] || row['売価'] || row['単価'] ||"0", 10),
                        category: row['カテゴリ'] || row['category'] || "一般"
                    }));

                    // Bulk put to IndexedDB (incredibly fast)
                    await db.products.bulkPut(productsToInsert);
                    const count = await db.products.count();

                    Swal.fire({
                        icon: 'success',
                        title: '取込完了！',
                        html: `<b>${productsToInsert.length}件</b> の商品マスターを端末データベースに高速登録しました。<br>現在の総商品登録数: <b>${count}件</b><br><br><span style="font-size:12px;color:#666;">これより市販のHIDスキャナで一瞬で商品が呼び出せます。数万点でも遅延なしで決済操作が可能です。</span>`
                    });
                    document.getElementById('excel-master-upload').value = '';
                } catch (error) {
                    console.error(error);
                    Swal.fire('エラー', '読み込みに失敗しました。正しいエクセル形式か確認してください。', 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // --- Mock Product API (now queries ultra-fast IndexedDB) ---
        async function mockProductApi(janCode) {
            return new Promise(async (resolve) => {
                let codeStr = String(janCode);
                try {
                    // --- ① インストアコード (NON-PLU) 判定ロジック ---
                    // 日本の規約: 「02」または「20〜29」から始まる13桁はインストアコード（生鮮・惣菜など）
                    if (codeStr.length === 13 && (codeStr.startsWith('02') || codeStr.startsWith('2'))) {
                        // フォーマット: [prefix2桁] + [商品コード5桁] + [値段5桁] + [チェックディジット1桁]
                        const prefix = codeStr.substring(0, 2);
                        const itemCode = codeStr.substring(2, 7);
                        const priceBlock = codeStr.substring(7, 12);
                        
                        let calculatedPrice = parseInt(priceBlock, 10);
                        let checkDigit = codeStr[12];
                        
                        // NON-PLU standard: the 5 price digits consist of a 1-digit price-check digit and 4-digit actual price value.
                        if (calculatedPrice >= 10000 && (prefix === '02' || prefix.startsWith('2'))) {
                            const actualPriceStr = codeStr.substring(8, 12);
                            calculatedPrice = parseInt(actualPriceStr, 10);
                            logDebug(`[Instore parsing] Price block ${priceBlock} treated as ${actualPriceStr}. Tax excluded calculated: ${calculatedPrice}`);
                        } else {
                            logDebug(`[Instore parsing] Price block parsed directly as ${calculatedPrice}`);
                        }
                        
                        return resolve({
                            janCode: codeStr,
                            name: `インストア生鮮食品 (${itemCode})`,
                            price: calculatedPrice,
                            category: "インストア"
                        });
                    }

                    // --- ② Check ultra-fast local IndexedDB ---
                    const productInfo = await db.products.get(codeStr);
                    if (productInfo) {
                        return resolve(productInfo);
                    }
                    
                    // --- ③ Fallback to productMaster (products.js) if exists ---
                    if (typeof productMaster !== 'undefined' && productMaster[codeStr]) {
                        return resolve({ janCode: codeStr, ...productMaster[codeStr] });
                    } 
                    
                    // --- ④ Not Found ---
                    resolve({ janCode: codeStr, name: "未登録商品", price: 100, category: "不明" });
                } catch (e) {
                    resolve({ janCode: codeStr, name: "エラー", price: 0, category: "ｴﾗｰ" });
                }
            });
        }


        // --- Auth Logic ---
        async function handleLogin() {
            const email = document.getElementById('input-email').value;
            const password = document.getElementById('input-pass').value;

            if (!email || !password) return alert("Email and Password are required.");

            try {
                const res = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    currentSession = { email: email, role: 'store', storeName: "Demo Store", sessionToken: "mock_token_" + Date.now() };
                    initPosScreen(currentSession);
                } else { alert(data.error || "Login Failed"); }
            } catch (e) { 
                console.error(e); 
                // ローカル環境(file://)やサーバー未起動時のデモ用フォールバック
                if (email === 'store@demo.com' && password === 'DemoPass2026!') {
                    currentSession = { email: email, role: 'store', storeName: "Demo Store", sessionToken: "mock_token_" + Date.now() };
                    initPosScreen(currentSession);
                    if (typeof Swal !== 'undefined') {
                        Swal.fire({toast:true, position:'top-end', icon:'info', title:'サーバー未起動のため<br>オフライン(デモ)モードで開始します', showConfirmButton:false, timer:3500});
                    }
                } else {
                    alert("通信エラー：サーバーが起動していません。(Network Error)");
                }
            }
        }

        // --- Password Reset ---
        function showResetModal() { document.getElementById('modal-reset').style.display = 'flex'; }
        function closeResetModal() { document.getElementById('modal-reset').style.display = 'none'; }
        async function doReset() {
            const email = document.getElementById('reset-email').value;
            if (!email) return alert("Email required");
            try {
                const res = await fetch(`${API_URL}/api/admin/settings/billing-email`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                alert("管理画面に請求先メールアドレスが登録されました。");
                closeResetModal();
            } catch (e) { alert("Error"); }
        }

        function initPosScreen(session) {
            document.getElementById('page-login').classList.remove('active');
            document.getElementById('page-pos').classList.add('active');
            document.getElementById('header-user-info').innerText = session.email;

            const select = document.getElementById('store-select');
            select.innerHTML = "";
            const opt = document.createElement('option');
            opt.value = "store1"; opt.innerText = "Demo Store 001";
            select.appendChild(opt);
            changeStore();
            initApp();
        }

        function changeStore() { console.log(`Store changed`); }

        function logout() {
            currentSession = null;
            document.getElementById('page-pos').classList.remove('active');
            document.getElementById('page-login').classList.add('active');
            document.getElementById('input-pass').value = '';
        }

        function resetPos() {
            total = 0; cartItems = [];
            document.getElementById('items').innerHTML = "";
            document.getElementById('total-display').innerText = "0";
            document.getElementById('page-payment').classList.remove('active');
            document.getElementById('page-pos').classList.add('active');
        }

        // --- POS & Scanner Logic ---
        const hints = new Map();
        const formats = [ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8];
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
        const codeReader = new ZXing.BrowserMultiFormatReader(hints);

        let total = 0;
        let isPaused = false;
        let cartItems = [];

        async function goToPayment() {
            if (total === 0) return alert("商品がありません");
            document.getElementById('page-pos').classList.remove('active');
            document.getElementById('page-payment').classList.add('active');
            document.getElementById('final-total').innerText = total.toLocaleString();

            const status = document.getElementById('sq-status');
            if(status) status.innerText = "";
            
            document.getElementById('sq-card-container').innerHTML = '';
            document.getElementById('google-pay-button').innerHTML = '';
            document.getElementById('apple-pay-button').innerHTML = '';

            initializeSquarePayment(total, 'sq-card-container', async () => {
                try {
                    const txData = {
                        storeId: currentSession ? currentSession.storeName : "Demo Store",
                        transactionId: "TX" + Date.now(),
                        amount: total,
                        items: cartItems.map(i => ({ janCode: i.janCode, name: i.name, price: i.price })),
                        timestamp: new Date().toISOString()
                    };

                    // Send exact POS transaction data to Admin Server (Fake API)
                    try {
                        const syncRes = await fetch(API_URL + '/api/admin/sales', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(txData)
                        });
                        addDebugLog("✅ [SERVER-SYNC] 決済データ送信成功: " + total + "円");
                    } catch(e) { 
                        console.log('Admin sync mock fallback', e); 
                        addDebugLog("⚠️ [SERVER-SYNC] 通信エラー・オフライン保存モード");
                    }

                    // --- Cross-Tab Sync for Local Demo ---
                    const localLog = JSON.parse(localStorage.getItem('admin_pos_log') || '[]');
                    localLog.unshift({ type: 'LIVE_SALE', source: 'どこでもレジ端末', amount: total, time: new Date().toLocaleTimeString(), items: txData.items.map(i=>i.name).join(', ') });
                    if(localLog.length > 50) localLog.pop();
                    localStorage.setItem('admin_pos_log', JSON.stringify(localLog));

                    Swal.fire({
                        icon: 'success',
                        title: '決済完了',
                        text: '決済が完了し、本部に売上データが送信されました。'
                    }).then(() => { resetPos(); });
                } catch (e) {
                    Swal.fire('エラー', '本部の通信に失敗しました (オフライン仮保存)', 'warning').then(() => { resetPos(); });
                }
            });
        }

        function backToScan() {
            document.getElementById('page-payment').classList.remove('active');
            document.getElementById('page-pos').classList.add('active');
        }

        async function startScanner() {
            try {
                const videoInputDevices = await codeReader.listVideoInputDevices();
                const backCamera = videoInputDevices.find(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('rear'));
                const deviceId = backCamera ? backCamera.deviceId : videoInputDevices[0].deviceId;
                codeReader.decodeFromVideoDevice(deviceId, 'video', (result, err) => {
                    if (result && !isPaused) onScanSuccess(result.text);
                });
            } catch (err) { console.error(err); }
        }

        async function onScanSuccess(code) {
            logDebug(`[SCAN EVENT] Raw Barcode Read: ${code}`);
            if (isPaused) return;
            isPaused = true;
            const mask = document.getElementById('mask');
            document.getElementById('mask-msg').innerText = "Searching db...";
            mask.style.display = 'flex';

            try {
                const product = await mockProductApi(code);
                logDebug(`[DB MATCH] Success: ${product.name} (¥${product.price})`);

                document.getElementById('mask-msg').innerText = "Scan OK!";
                setTimeout(() => mask.style.display = 'none', 200);
                document.getElementById('btn-next').style.display = 'block';

                total += product.price;
                cartItems.push(product);

                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:flex-start;">
                        <span style="font-weight:600;">${product.name}</span>
                        <span style="font-size:12px; color:#aaa;">${code}</span>
                    </div>
                    <span style="font-weight:700;">¥${product.price}</span>`;
                document.getElementById('items').prepend(row);
                document.getElementById('total-display').innerText = total.toLocaleString();
                if (navigator.vibrate) navigator.vibrate(100);

            } catch (error) { resumeScan(); }
        }

        function resumeScan() {
            isPaused = false;
            document.getElementById('mask').style.display = 'none';
            document.getElementById('btn-next').style.display = 'none';
        }

        function initApp() {
            const mask = document.getElementById('mask');
            mask.style.display = 'flex';
            mask.onclick = () => {
                mask.style.display = 'none';
                mask.onclick = null;
                startScanner();
            };
            
            // --- HID Barcode Scanner Integration ---
            // Physical Scanners send keypress events ending with Enter incredibly fast
            let hidBarcodeStr = "";
            let hidTimeout = null;
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && hidBarcodeStr.length >= 8) {
                    e.preventDefault();
                    onScanSuccess(hidBarcodeStr); 
                    hidBarcodeStr = "";
                    return;
                }
                
                if (/^[0-9]$/.test(e.key) || /^[a-zA-Z]$/.test(e.key)) {
                    hidBarcodeStr += e.key;
                    if(hidTimeout) clearTimeout(hidTimeout);
                    hidTimeout = setTimeout(() => { hidBarcodeStr = ""; }, 50); // reset if it was human typing manually
                }
            });
        }
    </script>
</body>
</html>
